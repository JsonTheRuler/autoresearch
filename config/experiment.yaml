experiment_name: "clf_smote04_ageins_lr01_or000"
random_seed: 42

data:
  price_file: "data/raw/ahs_price_sample.xlsx"
  insurance_file: "data/raw/ahs_insurance_sample.xlsx"
  survey_codes_to_nan: [-9, -8, -7]
  na_code_handling:
    CELLAR: 0
    CLIMB: 0
    CONFEE: 0
    default: "nan"
  outlier_percentiles: [0.0, 1.0]
  test_size: 0.20
  validation_size: 0.20

preprocessing:
  binary_recode: true
  condo_recode: true
  built_midpoints: true
  impute_strategy: "median"
  scale_numerical: true
  onehot_categorical: true

features:
  enabled_engineered:
    - AGE
    - LOG_UNITSF
    - LOG_LOT
    - ROOMS_PER_BATH
    - TOTAL_PROBLEMS
    - HAS_AMENITIES
    - HAS_BASEMENT
  insurance_extra:
    - HOUSING_BURDEN
    - INCOME_SOURCES
    - LOG_ZINC2
    - LOG_VALUE
    - AGE_INS
  drop_high_nan:
    - CLIMB
    - ELEV
    - MOBILTYP
    - INCP
  drop_leakage:
    - AMTI

regression:
  model_type: "lightgbm"
  hyperparameters:
    n_estimators: 3000
    max_depth: 1
    learning_rate: 0.0001
    subsample: 0.75
    colsample_bytree: 0.75
    random_state: 42
    verbose: -1
    n_jobs: -1
  offer_rate: 0.0
  smearing_correction: false

classification:
  model_type: "lightgbm"
  target: "BUYI"
  hyperparameters:
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.10
    is_unbalance: true
    random_state: 42
    verbose: -1
    n_jobs: -1
  sampling:
    strategy: "smote"
    smote_ratio: 0.4
    smote_k_neighbors: 5
  threshold_search:
    min: 0.01
    max: 0.99
    step: 0.01

scaling:
  annual_properties: 200000
